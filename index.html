<!DOCTYPE html>
<html lang="en">

<head>

  <!-- META -->

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <meta
    name="description"
    content="Modern code screenshot generator for developers."
  >

  <title>
    CodeSnap Studio Pro
  </title>

  <!-- FONT -->

  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  >

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  >

  <!-- FONT AWESOME -->

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  >

  <!-- PRISM -->

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css"
  >

  <!-- CSS -->

  <link
    rel="stylesheet"
    href="style.css"
  >

</head>

<body>

  <!-- BACKGROUND -->

  <div class="animated-bg"></div>

  <!-- APP -->

  <div class="app">

    <!-- HEADER -->

    <header class="header">

      <!-- LOGO -->

      <div class="logo-box">

        <div class="logo-icon">
          ⚡
        </div>

        <div>

          <h1>
            CodeSnap Studio Pro
          </h1>

          <p>
            Create beautiful code screenshots instantly
          </p>

        </div>

      </div>

      <!-- ACTIONS -->

      <div class="top-actions">

        <button id="copyBtn">

          <i class="fa-solid fa-copy"></i>

          Copy

        </button>

        <button id="exportBtn">

          <i class="fa-solid fa-download"></i>

          Export

        </button>

      </div>

    </header>

    <!-- CONTROLS -->

    <section class="controls">

      <!-- LANGUAGE -->

      <select id="languageSelect">

        <option value="javascript">
          JavaScript
        </option>

        <option value="html">
          HTML
        </option>

        <option value="css">
          CSS
        </option>

        <option value="python">
          Python
        </option>

      </select>

      <!-- THEME -->

      <select id="themeSelect">

        <option value="neon">
          Neon
        </option>

        <option value="glass">
          Glass
        </option>

        <option value="amoled">
          AMOLED
        </option>

      </select>

      <!-- TEMPLATE -->

      <button id="templateBtn">

        <i class="fa-solid fa-shuffle"></i>

        Random Template

      </button>

    </section>

    <!-- STATS -->

    <section class="stats">

      <!-- LINES -->

      <div class="stat-card">

        <span id="lineCount">
          0
        </span>

        <p>
          Lines
        </p>

      </div>

      <!-- CHARACTERS -->

      <div class="stat-card">

        <span id="charCount">
          0
        </span>

        <p>
          Characters
        </p>

      </div>

    </section>

    <!-- MAIN -->

    <main>

      <!-- EDITOR PANEL -->

      <section class="editor-panel">

        <!-- WINDOW BAR -->

        <div class="window-bar">

          <span class="red"></span>

          <span class="yellow"></span>

          <span class="green"></span>

        </div>

        <!-- EDITOR -->

        <div class="editor-wrapper">

          <!-- LINE NUMBERS -->

          <div id="lineNumbers"></div>

          <!-- INPUT -->

          <textarea
            id="codeInput"
            spellcheck="false"
          >function welcome(){

  console.log(
    "Welcome to CodeSnap Studio 🚀"
  );

}

welcome();</textarea>

        </div>

      </section>

      <!-- PREVIEW PANEL -->

      <section class="preview-panel">

        <!-- CARD -->

        <div
          class="preview-card"
          id="previewCard"
        >

          <!-- WINDOW BAR -->

          <div class="window-bar">

            <span class="red"></span>

            <span class="yellow"></span>

            <span class="green"></span>

          </div>

          <!-- PREVIEW -->

          <pre>
<code
id="codePreview"
class="language-javascript"
></code>
          </pre>

        </div>

      </section>

    </main>

  </div>

  <!-- PRISM -->

  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>

  <!-- PRISM LANGUAGES -->

  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markup.min.js"></script>

  <!-- HTML2CANVAS -->

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <!-- SCRIPT -->

  <script src="script.js"></script>

</body>
  </html>
